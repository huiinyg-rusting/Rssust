<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rssust</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.06) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: float 4s ease-in-out infinite;
        }

        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 30px 80px rgba(99, 102, 241, 0.5);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #e0e0e0 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #8888a0;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            color: #a5b4fc;
            margin-bottom: 2rem;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .info-cards {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            min-width: 160px;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s ease, transform 0.2s ease, background 0.3s ease;
        }

        .card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .card-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6666aa;
            margin-bottom: 0.3rem;
        }

        .card-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #c0c0e0;
        }

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            font-size: 0.8rem;
            color: #5555aa;
        }

        .status-bar span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-bar a {
            color: #818cf8;
            text-decoration: none;
            transition: color 0.2s;
        }

        .status-bar a:hover {
            color: #a5b4fc;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.5rem; }
            .logo { width: 70px; height: 70px; font-size: 2rem; }
            .info-cards { flex-direction: column; align-items: center; }
            .card { width: 100%; max-width: 280px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="logo">R</div>

        <div class="badge">
            <span class="badge-dot"></span>
            What are you looking for? 
        </div>

        <h1>Nothing Here</h1>
        <p class="subtitle">Rssust</p>

        <div class="info-cards">
            <div class="card">
                <div class="card-label">Status</div>
                <div class="card-value">Running</div>
            </div>

            <div class="card">
                <div class="card-label">Runtime</div>
                <div class="card-value">Rust (edition 2024)</div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span>&#9679; Server is running</span>
        <span>&mdash;</span>
        <span>powered by <a href="https://www.rust-lang.org" target="_blank">Rust</a></span>
    </div>
</body>
</html>

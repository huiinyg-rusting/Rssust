# 多平台并行构建（linux x86/arm, windows x86/arm）、从 Cargo.toml 读取版本（仅当版本包含 'S' 时才打包并上传 Release）
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BIN_NAME: rssust

jobs:
  prepare:
    name: Prepare (read Cargo.toml version & pkg)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      pkg_name: ${{ steps.get_version.outputs.pkg_name }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (for cargo metadata)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Read package name and version from Cargo.toml
        id: get_version
        shell: bash
        run: |
          set -euo pipefail
          echo "Running cargo metadata..."
          meta=$(cargo metadata --no-deps --format-version 1)
          if [ -z "$meta" ]; then
            echo "ERROR: cargo metadata returned empty output"
            exit 1
          fi
          echo "cargo metadata output length: ${#meta}"
          
          pkg_name=$(echo "$meta" | python3 << 'PYTHON_EOF'
          import sys, json
          data = sys.stdin.read()
          if not data.strip():
            print("ERROR: Empty input to JSON parser", file=sys.stderr)
            sys.exit(1)
          m = json.loads(data)
          print(m["packages"][0]["name"])
          PYTHON_EOF
          )
          version=$(echo "$meta" | python3 << 'PYTHON_EOF'
          import sys, json
          data = sys.stdin.read()
          if not data.strip():
            print("ERROR: Empty input to JSON parser", file=sys.stderr)
            sys.exit(1)
          m = json.loads(data)
          print(m["packages"][0]["version"])
          PYTHON_EOF
          )
          tag="${GITHUB_REF#refs/tags/}"
          echo "pkg_name=$pkg_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Found package: $pkg_name, version: $version, tag: $tag"
      - name: Skip if version does not contain 'S'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "Version from Cargo.toml: $VERSION"
          if [[ "$VERSION" != *S* ]]; then
            echo "Version does not contain 'S' — exiting early."
            exit 78
          fi
          echo "Version contains 'S' — proceeding."

  build:
    name: Build and package (matrix)
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 2    # 限制同时运行的 matrix job 数量，降低并发 runner 使用峰值
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            os_label: linux
            arch: x86_64
          - name: linux-arm64
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            os_label: linux
            arch: arm64
          - name: windows-x86_64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            os_label: windows
            arch: x86_64
          - name: windows-arm64
            runner: windows-latest
            rust_target: aarch64-pc-windows-msvc
            os_label: windows
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Determine BIN and VERSION
        run: |
          echo "bin_name=${{ needs.prepare.outputs.pkg_name }}" >> "$GITHUB_ENV"
          echo "pkg_version=${{ needs.prepare.outputs.version }}" >> "$GITHUB_ENV"
        shell: bash

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/${{ matrix.rust_target }}
          key: ${{ runner.os }}-cargo-${{ matrix.rust_target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust_target }}-

      - name: Add rust target (non-Windows shells)
        if: runner.os != 'Windows'
        run: |
          rustup target add "${{ matrix.rust_target }}" || true

      - name: Add rust target (Windows PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustup target add "${{ matrix.rust_target }}" | Out-Null

      - name: Install mingw on ubuntu for windows-gnu targets (not used by default)
        if: matrix.rust_target == 'x86_64-pc-windows-gnu' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Cargo build (UNIX)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          RUST_TARGET="${{ matrix.rust_target }}"
          echo "Building target $RUST_TARGET on $(uname -a)"
          cargo build --release --target "$RUST_TARGET"
        shell: bash

      - name: Cargo build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $RUST_TARGET = "${{ matrix.rust_target }}"
          Write-Host "Building target $RUST_TARGET on Windows"
          cargo build --release --target $RUST_TARGET

      - name: Prepare package directory (UNIX)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          BIN_NAME="${{ env.BIN_NAME }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          RUST_TARGET="${{ matrix.rust_target }}"
          OS="${{ matrix.os_label }}"
          ARCH="${{ matrix.arch }}"

          ART_DIR="release-artifacts"
          PACK_NAME="${BIN_NAME}-${VERSION}-${OS}-${ARCH}"
          PACK_DIR="${ART_DIR}/${PACK_NAME}"

          rm -rf "${PACK_DIR}"
          mkdir -p "${PACK_DIR}"

          # copy docs and optional files
          [[ -f "cookies.json" ]] && cp "cookies.json" "${PACK_DIR}/"
          [[ -d "docs_md" ]] && cp -a "docs_md" "${PACK_DIR}/"
          [[ -d "index" ]] && cp -a "index" "${PACK_DIR}/"

          # copy env/* if exists (preserve directory names)
          if [[ -d "env" ]]; then
            for d in env/*; do
              if [[ -d "$d" ]]; then
                name=$(basename "$d")
                mkdir -p "${PACK_DIR}/${name}"
                cp -a "$d/." "${PACK_DIR}/${name}/"
              fi
            done
          fi

          # copy the built binary into package root
          ext=""
          if [[ "$OS" == "windows" ]]; then ext=".exe"; fi
          BIN_PATH="target/${RUST_TARGET}/release/${BIN_NAME}${ext}"
          if [[ ! -f "$BIN_PATH" ]]; then
            echo "ERROR: expected binary at $BIN_PATH"
            ls -la "target/${RUST_TARGET}/release" || true
            exit 1
          fi
          cp "$BIN_PATH" "${PACK_DIR}/${BIN_NAME}${ext}"
          if [[ "$OS" != "windows" ]]; then chmod +x "${PACK_DIR}/${BIN_NAME}"; fi

          # zip
          (cd "${ART_DIR}" && zip -r -q "${PACK_NAME}.zip" "${PACK_NAME}")
          echo "Created ${ART_DIR}/${PACK_NAME}.zip"
          echo "zip_path=${ART_DIR}/${PACK_NAME}.zip" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Prepare package directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BIN_NAME = "${{ env.BIN_NAME }}"
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $RUST_TARGET = "${{ matrix.rust_target }}"
          $OS = "${{ matrix.os_label }}"
          $ARCH = "${{ matrix.arch }}"

          $ART_DIR = "release-artifacts"
          $PACK_NAME = "$BIN_NAME-$VERSION-$OS-$ARCH"
          $PACK_DIR = Join-Path $ART_DIR $PACK_NAME

          if (Test-Path $PACK_DIR) { Remove-Item -Recurse -Force $PACK_DIR }
          New-Item -ItemType Directory -Path $PACK_DIR | Out-Null

          if (Test-Path "cookies.json") { Copy-Item -Path "cookies.json" -Destination $PACK_DIR -Force }
          if (Test-Path "docs_md") { Copy-Item -Path "docs_md" -Destination $PACK_DIR -Recurse -Force }
          if (Test-Path "index") { Copy-Item -Path "index" -Destination $PACK_DIR -Recurse -Force }

          if (Test-Path "env") {
            Get-ChildItem -Path "env" -Directory | ForEach-Object {
              $dest = Join-Path $PACK_DIR $_.Name
              New-Item -ItemType Directory -Path $dest | Out-Null
              Copy-Item -Path ($_ | Resolve-Path).Path -Destination $dest -Recurse -Force
            }
          }

          $ext = ""
          if ($OS -eq "windows") { $ext = ".exe" }
          $binPath = "target/$RUST_TARGET/release/$BIN_NAME$ext"
          if (-not (Test-Path $binPath)) {
            Write-Error "Binary not found at $binPath"
            Exit 1
          }
          Copy-Item -Path $binPath -Destination (Join-Path $PACK_DIR "$BIN_NAME$ext") -Force

          $zipPath = "$ART_DIR\$PACK_NAME.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $PACK_DIR '*') -DestinationPath $zipPath -Force
          Write-Host "Created $zipPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_path=$zipPath"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-zip
          path: release-artifacts/*.zip

  release:
    name: Create Release and upload zips
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Show downloaded artifacts
        run: |
          ls -la downloaded-artifacts
          find downloaded-artifacts -type f -maxdepth 3 -name '*.zip' -print || true

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          release_name: "Rssust ${{ needs.prepare.outputs.version }}"
          body: "Automated release for version ${{ needs.prepare.outputs.version }} (contains 'S')."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload zip assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          UPLOAD_URL="${{ steps.create_release.outputs.upload_url }}"
          echo "Release upload URL: $UPLOAD_URL"

          mapfile -t files < <(find downloaded-artifacts -type f -name '*.zip' -print)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No zip artifacts found to upload"
            exit 1
          fi

          for f in "${files[@]}"; do
            name=$(basename "$f")
            echo "Uploading $name ..."
            curl --fail -sS -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/zip" \
              --data-binary @"$f" \
              "$UPLOAD_URL?name=$name"
            echo "Uploaded $name"
          done

      - name: Done
        run: echo "Release and uploads complete."
